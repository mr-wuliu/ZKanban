name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish ZhipuUsageWidget -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ZhipuUsageWidget/bin/Release/net10.0-windows/win-x64/publish/ZhipuUsageWidget.exe
